name: Build and deploy Node.js app to Azure Web App - demofullappserv

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      # 3. Install backend dependencies
      - name: Install backend dependencies
        run: npm install

      # 4. Build frontend (React)
      - name: Build frontend
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm install
            npm run build
            cd ..
          fi

      # 5. Copy React build to backend /build
      - name: Copy frontend build
        run: |
          if [ -d "frontend/build" ]; then
            rm -rf build
            cp -r frontend/build ./build
          fi

      # 6. Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      # 7. Download build artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # 8. Login to Azure (OIDC)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_702E1EFA328949E592F985761093E965 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_751EA69D8E4F426B990D8C86BE4EAFB4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_456A4F0A265141BF8DA404F2547C7D9A }}

      # 9. Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'demofullappserv'
          slot-name: 'Production'
          package: .

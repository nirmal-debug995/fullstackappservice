name: Build and deploy Node.js app to Azure Web App - demofullappserv

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      # 3. Install backend dependencies
      - name: Install dependencies
        run: npm install

      # 4. Upload artifact for deployment
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      # 5. Download artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # 6. Login to Azure (OIDC)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURECREDIN }}

      # 7. Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'demofullappserv'
          slot-name: 'Production'
          package: .

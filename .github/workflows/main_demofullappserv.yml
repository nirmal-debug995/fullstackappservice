name: Deploy Fullstack App to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Start SSH agent and add private key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.GITHUB_SSH_KEY }}

      # Step 3: Connect to Azure VM and deploy
      - name: Deploy to Azure VM
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }} << 'EOF'
            cd /home/${{ secrets.AZURE_VM_USER }}/fullstackappservice
            git reset --hard
            git pull origin main
            npm install
            npm run build
            pm2 restart fullstackapp || pm2 start server.js --name fullstackapp --update-env
          EOF
